# Local infrastructure for the Notification Dispatcher: Kafka (single-node KRaft) + MS SQL Server.
#
#   docker compose up -d       # start Kafka + SQL Server, and create the 'dispatcher' database
#   ./gradlew bootRun          # run the service against them
#
# The SA password defaults to a local dev value; override MSSQL_SA_PASSWORD (e.g. via .env) if desired.
services:
  kafka:
    image: apache/kafka:latest
    container_name: dispatcher-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dispatcher-sqlserver
    platform: linux/amd64
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Str0ng!Passw0rd}
      MSSQL_PID: "Developer"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  # One-shot: waits for SQL Server to be healthy, creates the 'dispatcher' database if absent, then exits.
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dispatcher-sqlserver-init
    platform: linux/amd64
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint:
      - /opt/mssql-tools18/bin/sqlcmd
      - -S
      - sqlserver
      - -U
      - sa
      - -P
      - ${MSSQL_SA_PASSWORD:-Str0ng!Passw0rd}
      - -C
      - -Q
      - "IF DB_ID('dispatcher') IS NULL CREATE DATABASE dispatcher"
    restart: "no"
