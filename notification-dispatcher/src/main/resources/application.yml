spring:
  application:
    name: notification-dispatcher

  datasource:
    # Defaults target the local docker-compose stack; override via env in other environments
    # (SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD).
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=dispatcher;encrypt=false;trustServerCertificate=true}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:Str0ng!Passw0rd}

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates the mapping against it.
    open-in-view: false         # No lazy loading outside the service layer; avoids the OSIV anti-pattern.
    properties:
      hibernate.jdbc.time_zone: UTC   # Read/write timestamps as UTC regardless of the JVM's default zone.

  flyway:
    enabled: true               # Runs the migrations in classpath:db/migration on startup.

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}   # local default; override via env
    consumer:
      group-id: notification-dispatcher
      auto-offset-reset: earliest   # A fresh consumer group reads decisions from the start of the topic.

# Actuator health endpoint for the local-run smoke check (GET /actuator/health), with component details.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# Emit the shared cross-service structured-log JSON (see shared/src/logFactory.ts) for all console output.
logging:
  structured:
    format:
      console: com.dawidwit.dispatcher.logging.SharedLogEventStructuredLogFormatter

dispatcher:
  logging:
    service-name: notification-dispatcher   # shared MicroserviceName value -> LogEvent.serviceName
    environment: development                 # production | staging | development -> meta.environment
    version: 1.0.0                           # -> meta.version
  kafka:
    decisions-topic: notification.decisions
    retry:
      attempts: "4"                 # 1 initial delivery + 3 retries, then dead-letter
      initial-delay-ms: "1000"      # exponential backoff: 1s, 2s, 4s
      multiplier: "2.0"
      max-delay-ms: "10000"
  simulation:
    # Demo/verification hook: senders throw for this eventType so the retry/DLT path can be exercised.
    # Blank disables it. Normal events use their real eventType and are delivered.
    failure-event-type: force_failure
